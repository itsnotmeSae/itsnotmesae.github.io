<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earth Games Chat</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Top Bar -->
        <div class="top-bar">
            <div class="logo">
                <span class="logo-icon">🌍</span>
                <span class="logo-text">Earth Games Chat</span>
            </div>
            <div class="top-bar-right">
                <div class="connection-status">
                    <span class="status-indicator" id="statusIndicator"></span>
                    <span id="onlineCount">0 Online</span>
                </div>
                <button id="logoutButton" class="logout-button" style="display: none;">Log out</button>
            </div>
        </div>

        <!-- Auth Screen (Login / Register) -->
        <div class="auth-screen" id="authScreen">
            <div class="auth-card">
                <div class="auth-tabs">
                    <button class="auth-tab active" id="loginTab" data-mode="login">Log In</button>
                    <button class="auth-tab" id="registerTab" data-mode="register">Register</button>
                </div>

                <h2 id="authTitle">Welcome Back</h2>
                <p id="authSubtitle">Log in to join the chat</p>

                <form id="authForm" autocomplete="on">
                    <input
                        type="text"
                        id="authUsername"
                        name="username"
                        placeholder="Username"
                        maxlength="15"
                        class="username-input"
                        autocomplete="username"
                    >
                    <input
                        type="password"
                        id="authPassword"
                        name="password"
                        placeholder="Password"
                        maxlength="100"
                        class="username-input"
                        autocomplete="current-password"
                    >
                    <div class="auth-error" id="authError"></div>
                    <button type="submit" id="authButton" class="minecraft-button">Log In</button>
                </form>
                <div class="auth-hint">3-15 characters, alphanumeric and underscores only &middot; password 6+ characters</div>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="main-content" id="mainContent" style="display: none;">
            <!-- Left Sidebar - Online Users -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <h3>Players Online</h3>
                    <span class="player-count" id="playerCount">0</span>
                </div>
                <div class="users-list" id="usersList">
                    <div class="no-users">No players online</div>
                </div>
            </div>

            <!-- Center - Chat Area -->
            <div class="chat-area">
                <!-- Messages Container -->
                <div class="messages-container" id="messagesContainer">
                    <div class="welcome-message">
                        <div class="welcome-icon">⛏️</div>
                        <h2>Welcome to Earth Games Chat</h2>
                        <p>A Minecraft-inspired chat experience</p>
                    </div>
                </div>

                <!-- Typing Indicator -->
                <div class="typing-indicator hidden" id="typingIndicator">
                    <span id="typingUsers"></span>
                    <div class="typing-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="input-area">
                    <!-- Chat Input Area -->
                    <div class="chat-input-area" id="chatInputArea">
                        <div class="input-controls">
                            <button id="emojiButton" class="emoji-button" title="Add emoji">😊</button>
                            <textarea
                                id="messageInput"
                                placeholder="Type a message... (Shift+Enter for new line)"
                                class="message-input"
                            ></textarea>
                            <button id="sendButton" class="send-button">Send</button>
                        </div>
                        <div class="input-footer">
                            <label class="sound-toggle">
                                <input type="checkbox" id="soundToggle" checked>
                                <span>🔊 Sound</span>
                            </label>
                            <span class="char-count"><span id="charCount">0</span>/500</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Emoji Picker (Hidden by default) -->
    <div class="emoji-picker" id="emojiPicker">
        <div class="emoji-grid">
            <button class="emoji-item" data-emoji="😊">😊</button>
            <button class="emoji-item" data-emoji="😂">😂</button>
            <button class="emoji-item" data-emoji="❤️">❤️</button>
            <button class="emoji-item" data-emoji="👍">👍</button>
            <button class="emoji-item" data-emoji="🎮">🎮</button>
            <button class="emoji-item" data-emoji="⛏️">⛏️</button>
            <button class="emoji-item" data-emoji="💎">💎</button>
            <button class="emoji-item" data-emoji="🔥">🔥</button>
            <button class="emoji-item" data-emoji="⚡">⚡</button>
            <button class="emoji-item" data-emoji="🌙">🌙</button>
            <button class="emoji-item" data-emoji="⭐">⭐</button>
            <button class="emoji-item" data-emoji="🎯">🎯</button>
            <button class="emoji-item" data-emoji="🚀">🚀</button>
            <button class="emoji-item" data-emoji="💪">💪</button>
            <button class="emoji-item" data-emoji="🤔">🤔</button>
            <button class="emoji-item" data-emoji="😎">😎</button>
        </div>
    </div>

    <!-- Desktop Notification Sound -->
    <audio id="notificationSound" preload="auto">
        <source src="data:audio/wav;base64,UklGRiYAAABXQVZFZm10IBAAAAABAAEAQB8AAAB9AAACABAAZGF0YQIAAAAAAA==" type="audio/wav">
    </audio>

    <script src="app.js"></script>
</body>
</html>
